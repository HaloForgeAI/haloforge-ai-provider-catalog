name: Sync upstream model catalog

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */12 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-upstream-models
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync upstream sources
        run: npm run sync:upstreams

      - name: Build aggregate catalog
        run: npm run build

      - name: Verify generated catalog
        run: npm run check

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and open pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: chore/sync-upstream-model-catalog
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH_NAME"
          git add catalog/manifest.json catalog/model-provider-catalog.json providers sources package.json scripts .github/workflows
          git commit -m "Sync upstream model catalog"
          git push --force-with-lease origin "$BRANCH_NAME"
          open_pr_count="$(gh pr list --base main --head "$BRANCH_NAME" --state open --json number --jq 'length')"
          if [ "$open_pr_count" -gt 0 ]; then
            echo "A sync pull request already exists for $BRANCH_NAME."
          elif gh pr create \
            --base main \
            --head "$BRANCH_NAME" \
            --title "Sync upstream model catalog" \
            --body "Automated sync from configured machine-readable upstream sources and curated official-doc overrides. Review provider fragments, lifecycle metadata, and generated catalog before merging."; then
            echo "Created sync pull request for $BRANCH_NAME."
          else
            echo "::warning::Unable to create a pull request from GitHub Actions. The sync branch was pushed successfully."
            echo "::notice::Open the review PR manually: https://github.com/$GITHUB_REPOSITORY/pull/new/$BRANCH_NAME"
          fi
